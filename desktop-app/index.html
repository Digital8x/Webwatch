<!DOCTYPE html>
<html>
<head>
  <title>WebWatch Pro - Setup</title>
  <style>
    body {
      background-color: #050810;
      color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #0a0e1a;
      border: 1px solid #1e2a4a;
      padding: 40px;
      border-radius: 12px;
      width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    h1 { margin-top: 0; color: #3b82f6; }
    p { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      box-sizing: border-box;
      background: #111827;
      border: 1px solid #1e2a4a;
      border-radius: 6px;
      color: white;
      margin-bottom: 20px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    button {
      background: #2c87ff;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover { background: #1a6aff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>WebWatch Pro</h1>
    <p>Enter the URL where your WebWatch engine is hosted (e.g., https://monitor.yourdomain.com or http://localhost:3939 for testing).</p>
    <input type="url" id="urlInput" placeholder="https://..." required>
    <button onclick="saveUrl()">Connect</button>
  </div>

  <script>
    function saveUrl() {
      const url = document.getElementById('urlInput').value;
      if (url) {
        window.electronAPI.saveServerUrl(url);
      }
    }
  </script>
</body>
</html>
